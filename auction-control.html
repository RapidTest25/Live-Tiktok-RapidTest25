<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control Panel</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #fff8ee;
      --ink: #1b1b1b;
      --muted: #6d6154;
      --accent: #ff6b35;
      --accent-2: #0f9d92;
      --border: rgba(27,27,27,0.08);
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      padding: 14px;
      max-width: 500px;
      margin: 0 auto;
    }
    h1 { font-size: 1.15rem; margin: 0 0 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .card h3 { margin: 0 0 8px; font-size: 0.9rem; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 100px; }
    .field label { font-size: 0.75rem; color: var(--muted); }
    .field.small { max-width: 100px; flex: 0 0 100px; }
    input {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fffaf3;
      font-family: inherit;
      font-size: 0.82rem;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 7px 14px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: transform 0.15s;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: var(--accent); color: #fff; }
    button.secondary { background: #2f2f2f; color: #fff; }
    button.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    button.success { background: var(--accent-2); color: #fff; }
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

    .status-bar {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,107,53,0.06);
      border: 1px solid rgba(255,107,53,0.12);
      margin-bottom: 8px;
    }
    .status-bar.active { background: rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.15); }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 3px;
    }
    .status-row:last-child { margin-bottom: 0; }
    .status-bar .big {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      min-width: 45px;
      text-align: right;
    }
    .status-bar .gold { color: #b8860b; font-weight: 700; }

    .top-bidders {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--border);
    }
    .top-bidders h4 { margin: 0 0 4px; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .bidder-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 7px;
      border-radius: 6px;
      background: rgba(255,215,0,0.05);
      margin-bottom: 2px;
      font-size: 0.78rem;
    }
    .bidder-row .rank { font-weight: 800; color: var(--accent); min-width: 20px; }
    .bidder-row .name { flex: 1; font-weight: 600; }
    .bidder-row .amount { color: #b8860b; font-weight: 700; }

    .link-box {
      display: flex;
      gap: 6px;
      align-items: center;
      background: #fffaf3;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 0.75rem;
      word-break: break-all;
    }
    .link-box a { color: var(--accent-2); font-weight: 600; text-decoration: none; }

    .toast {
      position: fixed;
      bottom: 14px;
      right: 14px;
      padding: 7px 12px;
      border-radius: 8px;
      background: #2f2f2f;
      color: #fff;
      font-size: 0.78rem;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .error-banner {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #dc2626;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.78rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>🔨 Control Panel</h1>

  <div id="errorBanner" class="error-banner" style="display:none"></div>

  <div class="status-bar" id="statusBar">
    <div class="status-row">
      <span>Status: <strong id="statusText">-</strong></span>
      <span class="big" id="timerDisplay">00:00</span>
    </div>
    <div class="status-row">
      <span>🪙 <span class="gold" id="currentBidDisplay">0</span></span>
      <span>oleh <strong id="currentBidderDisplay">-</strong></span>
    </div>
    <div id="topBiddersSection" class="top-bidders" style="display:none">
      <h4>Top 3</h4>
      <div id="topBiddersList"></div>
    </div>
  </div>

  <div class="card">
    <h3>Pengaturan</h3>
    <div class="row">
      <div class="field">
        <label>Judul</label>
        <input id="auctionTitle" type="text" placeholder="Judul event">
      </div>
    </div>
    <div class="row">
      <div class="field small">
        <label>Timer (detik)</label>
        <input id="timerSeconds" type="number" min="10" value="60">
      </div>
      <div class="field small">
        <label>Snipe (detik)</label>
        <input id="snipeThreshold" type="number" min="0" value="30" title="Jika gift masuk saat timer di bawah ini, waktu otomatis bertambah">
      </div>
      <div class="field small">
        <label>+Waktu</label>
        <input id="snipeExtend" type="number" min="0" value="10" title="Detik yang ditambah saat snipe">
      </div>
    </div>
    <div class="btn-row">
      <button class="primary" id="saveConfigBtn">💾 Simpan</button>
    </div>
  </div>

  <div class="card">
    <h3>Kontrol</h3>
    <div class="btn-row">
      <button class="success" id="startBtn">▶ Mulai</button>
      <button class="ghost" id="pauseBtn">⏸ Jeda</button>
      <button class="secondary" id="stopBtn">⏹ Stop</button>
      <button class="ghost" id="resetBtn">↺ Reset</button>
      <button class="ghost" id="extendBtn">+10s</button>
    </div>
  </div>

  <div class="card">
    <h3>Test</h3>
    <div class="row">
      <div class="field">
        <label>Nama</label>
        <input id="testBidder" type="text" placeholder="Nama" value="TestUser">
      </div>
      <div class="field small">
        <label>Coins</label>
        <input id="testAmount" type="number" min="0" value="50">
      </div>
      <button class="primary" id="testBidBtn" style="align-self:flex-end">Kirim</button>
    </div>
  </div>

  <div class="card">
    <h3>Link OBS</h3>
    <div class="link-box">
      <a id="overlayLink" href="#" target="_blank">-</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var STORAGE_KEY = "tiktok_live_tool_state_v1";
    var params = new URLSearchParams(window.location.search);

    function getBackendUrl() {
      var fromParams = params.get("backend");
      if (fromParams) return fromParams.replace(/\/$/, "");
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed.backendUrl) return parsed.backendUrl.replace(/\/$/, "");
        }
      } catch (e) {}
      return "";
    }

    var backendUrl = getBackendUrl();

    function $(id) { return document.getElementById(id); }

    function showToast(msg) {
      var t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(function() { t.classList.remove("show"); }, 2000);
    }

    function formatTime(seconds) {
      var m = Math.floor(seconds / 60);
      var s = seconds % 60;
      return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
    }

    function formatNumber(n) { return Number(n || 0).toLocaleString("id-ID"); }
    function esc(t) { return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    async function apiPost(path, body) {
      if (!backendUrl) {
        $("errorBanner").style.display = "block";
        $("errorBanner").textContent = "Backend URL tidak ditemukan. Buka dashboard utama dulu.";
        return null;
      }
      $("errorBanner").style.display = "none";
      try {
        var res = await fetch(backendUrl + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body || {})
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || "Gagal");
        showToast("OK ✓");
        return data;
      } catch (e) {
        showToast("Error: " + e.message);
        return null;
      }
    }

    function updateStatus(data) {
      if (!data) return;
      var state = data.auction || data;
      var topBidders = data.topBidders || [];

      var bar = $("statusBar");
      bar.className = "status-bar" + (state.isActive ? " active" : "");
      $("statusText").textContent = state.isActive
        ? (state.isPaused ? "PAUSED" : "LIVE")
        : (state.startedAt ? "SELESAI" : "Siap");
      $("timerDisplay").textContent = formatTime(state.timerRemaining || 0);
      $("currentBidDisplay").textContent = formatNumber(state.currentBid);
      $("currentBidderDisplay").textContent = state.currentBidder || "-";
      $("pauseBtn").textContent = state.isPaused ? "▶ Lanjut" : "⏸ Jeda";

      if (topBidders.length > 0) {
        $("topBiddersSection").style.display = "block";
        var html = "";
        for (var i = 0; i < topBidders.length; i++) {
          var b = topBidders[i];
          html += '<div class="bidder-row"><span class="rank">#' + (i+1) + '</span><span class="name">' + esc(b.name) + '</span><span class="amount">🪙 ' + formatNumber(b.totalAmount) + '</span></div>';
        }
        $("topBiddersList").innerHTML = html;
      } else {
        $("topBiddersSection").style.display = "none";
      }
    }

    async function fetchState() {
      if (!backendUrl) return;
      try {
        var res = await fetch(backendUrl + "/auction-state", { cache: "no-store" });
        if (!res.ok) return;
        var data = await res.json();
        if (data.auction) updateStatus(data);
      } catch (e) {}
    }

    function init() {
      if (!backendUrl) {
        $("errorBanner").style.display = "block";
        $("errorBanner").textContent = "Backend URL tidak ditemukan. Buka dashboard utama dulu (yang sudah connect ke TikTok), lalu buka halaman ini lagi.";
      }

      var overlayUrl = new URL("auction.html", window.location.href);
      if (backendUrl) overlayUrl.searchParams.set("backend", backendUrl);
      $("overlayLink").href = overlayUrl.toString();
      $("overlayLink").textContent = overlayUrl.toString();

      $("saveConfigBtn").addEventListener("click", function() {
        apiPost("/auction/config", {
          title: $("auctionTitle").value,
          timerSeconds: Number($("timerSeconds").value) || 60,
          snipeThreshold: Number($("snipeThreshold").value) || 0,
          snipeExtend: Number($("snipeExtend").value) || 0
        });
      });

      $("startBtn").addEventListener("click", function() { apiPost("/auction/start"); });
      $("pauseBtn").addEventListener("click", function() { apiPost("/auction/pause"); });
      $("stopBtn").addEventListener("click", function() { apiPost("/auction/stop"); });
      $("resetBtn").addEventListener("click", function() { apiPost("/auction/reset"); });
      $("extendBtn").addEventListener("click", function() { apiPost("/auction/extend", { seconds: 10 }); });

      $("testBidBtn").addEventListener("click", function() {
        apiPost("/auction/bid", {
          bidder: $("testBidder").value || "TestUser",
          amount: Number($("testAmount").value) || 0
        });
      });

      fetchState();
      setInterval(fetchState, 1000);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
