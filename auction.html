<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Overlay</title>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 20px rgba(255,107,53,0.2); } 50% { box-shadow: 0 0 40px rgba(255,107,53,0.5); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes timerWarn { 0%,100% { color: #ff6b35; } 50% { color: #ff2222; } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    @keyframes idlePulse { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } }

    :root {
      color-scheme: dark;
      --bg: rgba(0,0,0,0);
      --card: rgba(10,16,26,0.95);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.55);
      --accent: #ff6b35;
      --accent-2: #3b82f6;
      --gold: #ffd700;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .overlay-card {
      width: min(420px, 88vw);
      padding: 24px 28px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    .timer-display {
      font-size: 3.2rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .timer-display.warning { animation: timerWarn 0.8s infinite; color: #ff4444; }
    .timer-display.paused { color: #9ca3af; }
    .timer-display.ended { color: #6b7280; }

    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }
    .status-tag.live { background: rgba(239,68,68,0.2); color: #f87171; }
    .status-tag.paused { background: rgba(255,193,7,0.15); color: #fbbf24; }
    .status-tag.ended { background: rgba(107,114,128,0.15); color: #9ca3af; }
    .status-tag.idle { background: rgba(59,130,246,0.12); color: #93c5fd; }

    .coin-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .coin-icon {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 10px rgba(255,215,0,0.4));
    }
    .coin-amount {
      font-size: 2.6rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 25px rgba(255,215,0,0.3);
    }
    .coin-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .participants {
      font-size: 1.1rem;
      color: var(--muted);
    }
    .participants strong {
      color: var(--text);
      font-weight: 800;
    }

    .winner-banner {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,107,53,0.1);
      border: 1px solid rgba(255,107,53,0.2);
    }
    .winner-banner .winner-label {
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
    }
    .winner-banner .winner-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--gold);
    }
    .winner-banner .winner-amount {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .title-display {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }

    /* Idle state */
    .idle-overlay {
      width: min(380px, 85vw);
      padding: 28px 24px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      animation: idlePulse 4s ease-in-out infinite;
    }
    .idle-timer {
      font-size: 2.8rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: 3px;
      opacity: 0.9;
    }
    .idle-text {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .idle-text .coin-icon { font-size: 0.8em; }
  </style>
</head>
<body>
  <div id="auctionRoot">
    <div class="idle-overlay">
      <div class="idle-timer">00:00</div>
      <div class="idle-text"><span class="coin-icon">🪙</span> 0 COINS — 0 Participants</div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const backendUrl = (params.get("backend") || "").replace(/\/$/, "");
    const root = document.getElementById("auctionRoot");

    function formatTime(seconds) {
      var m = Math.floor(seconds / 60);
      var s = seconds % 60;
      return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
    }

    function formatNumber(n) {
      return Number(n || 0).toLocaleString("id-ID");
    }

    function escapeHtml(text) {
      return String(text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function renderAuction(state) {
      if (!state || (!state.isActive && !state.startedAt)) {
        root.innerHTML = '<div class="idle-overlay"><div class="idle-timer">00:00</div><div class="idle-text"><span class="coin-icon">🪙</span> 0 COINS — 0 Participants</div></div>';
        return;
      }

      var isActive = state.isActive;
      var isPaused = state.isPaused;
      var timer = state.timerRemaining || 0;
      var participants = (state.bidHistory || []).length;
      var uniqueParticipants = {};
      (state.bidHistory || []).forEach(function(b) { uniqueParticipants[b.bidder] = true; });
      var participantCount = Object.keys(uniqueParticipants).length;

      var timerClass = "";
      var statusClass = "";
      var statusText = "";

      if (isActive && isPaused) {
        timerClass = "paused";
        statusClass = "paused";
        statusText = "JEDA";
      } else if (isActive && timer <= 10) {
        timerClass = "warning";
        statusClass = "live";
        statusText = "🔴 LIVE";
      } else if (isActive) {
        statusClass = "live";
        statusText = "🔴 LIVE";
      } else {
        timerClass = "ended";
        statusClass = "ended";
        statusText = "SELESAI";
      }

      var html = '<div class="overlay-card">';
      html += '<div class="status-tag ' + statusClass + '">' + statusText + '</div>';
      html += '<div class="timer-display ' + timerClass + '">' + formatTime(timer) + '</div>';

      if (state.title) {
        html += '<div class="title-display">' + escapeHtml(state.title) + '</div>';
      }

      html += '<div class="coin-display"><span class="coin-icon">🪙</span><span class="coin-amount">' + formatNumber(state.currentBid) + '</span></div>';
      html += '<div class="coin-label">COINS</div>';
      html += '<div class="participants"><strong>' + participantCount + '</strong> Participants</div>';

      if (!isActive && state.startedAt && state.currentBidder) {
        html += '<div class="winner-banner">';
        html += '<div class="winner-label">Pemenang</div>';
        html += '<div class="winner-name">' + escapeHtml(state.currentBidder) + '</div>';
        html += '<div class="winner-amount">🪙 ' + formatNumber(state.currentBid) + ' COINS</div>';
        html += '</div>';
      }

      html += '</div>';
      root.innerHTML = html;
    }

    async function fetchState() {
      if (!backendUrl) return;
      try {
        var res = await fetch(backendUrl + "/auction-state", { cache: "no-store" });
        if (!res.ok) return;
        var data = await res.json();
        if (data.auction) renderAuction(data.auction);
      } catch (e) {}
    }

    if (backendUrl) {
      fetchState();
      setInterval(fetchState, 1000);
    } else {
      root.innerHTML = '<div class="idle-overlay"><div class="idle-timer">00:00</div><div class="idle-text" style="color:#ff6b35">Tambahkan ?backend=URL di address bar</div></div>';
    }
  </script>
</body>
</html>
