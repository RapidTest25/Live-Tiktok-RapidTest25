<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Overlay Mutasi</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgba(0, 0, 0, 0);
      --card: rgba(8, 15, 24, 0.86);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --accent: #8fc64f;
      --accent-2: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .wrap {
      width: min(900px, 92vw);
      padding: 26px 30px;
      border-radius: 28px;
      background: radial-gradient(circle at top left, rgba(59,130,246,0.22), rgba(8,15,24,0.94) 55%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    .tag {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(143, 198, 79, 0.18);
      color: #d9ff9a;
      font-weight: 700;
      letter-spacing: 0.4px;
      font-size: 0.92rem;
    }
    .title {
      margin: 16px 0 8px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
      font-weight: 900;
      min-height: 1.05em;
    }
    .roller-window {
      position: relative;
      height: clamp(64px, 8vw, 110px);
      overflow: hidden;
      margin: 16px 0 8px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
    }
    .roller-track {
      display: flex;
      flex-direction: column;
      transition: transform 2.3s cubic-bezier(0.12, 0.9, 0.18, 1);
      will-change: transform;
    }
    .roller-item {
      min-height: clamp(64px, 8vw, 110px);
      display: flex;
      align-items: center;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
      font-weight: 900;
      color: #f6f7fb;
    }
    .viewer {
      font-size: clamp(1rem, 2.2vw, 1.4rem);
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 600;
    }
    .gift {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: #8fe7e0;
      font-weight: 700;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 1.25rem;
      padding: 50px 20px;
    }
  </style>
</head>
<body>
  <div class="wrap" id="overlayRoot">
    <div class="empty">Belum ada hasil spin mutasi</div>
  </div>
  <script>
    const STORAGE_KEY = "tiktok_live_tool_state_v1";
    const root = document.getElementById("overlayRoot");

    function getLatestSpinEntry() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const queue = Array.isArray(parsed.jokiQueue) ? parsed.jokiQueue : [];
        const spinEntries = queue
          .filter((entry) => entry && entry.rewardMode === "spin")
          .sort((a, b) => (b.lastSpinAt || b.lastAddedAt || b.time || 0) - (a.lastSpinAt || a.lastAddedAt || a.time || 0));
        return spinEntries[0] || null;
      } catch (err) {
        return null;
      }
    }

    let lastSeenSpinKey = "";
    let rollTimeout = null;

    function renderFinal(entry) {
      const giftQty = Number(entry.giftQty) || Number(entry.qty) || 1;
      const giftText = entry.giftName && entry.giftName !== "-"
        ? `${entry.giftName}${giftQty > 1 ? ` x${giftQty}` : ""}${entry.diamondCount ? ` (${entry.diamondCount}🪙)` : ""}`
        : "Gift";

      root.innerHTML = `
        <div class="tag">HASIL SPIN MUTASI</div>
        <div class="title">${entry.action || "Mutasi"}</div>
        <div class="viewer">${entry.user || "Viewer"}</div>
        <div class="gift">${giftText}</div>
      `;
    }

    function animateSpin(entry) {
      const spinResults = entry.spinResults || {};
      const labels = Object.keys(spinResults).length ? Object.keys(spinResults) : ["Golden", "Diamond", "Plasma", "Radio Active"];
      const giftQty = Number(entry.giftQty) || Number(entry.qty) || 1;
      const giftText = entry.giftName && entry.giftName !== "-"
        ? `${entry.giftName}${giftQty > 1 ? ` x${giftQty}` : ""}${entry.diamondCount ? ` (${entry.diamondCount}🪙)` : ""}`
        : "Gift";

      const finalLabel = entry.action || labels[labels.length - 1] || "Mutasi";
      const sequence = [];
      for (let i = 0; i < 14; i += 1) {
        sequence.push(labels[i % labels.length]);
      }
      sequence.push(finalLabel);

      clearTimeout(rollTimeout);
      root.innerHTML = `
        <div class="tag">HASIL SPIN MUTASI</div>
        <div class="roller-window">
          <div class="roller-track">
            ${sequence.map((label) => `<div class="roller-item">${label}</div>`).join("")}
          </div>
        </div>
        <div class="viewer">${entry.user || "Viewer"}</div>
        <div class="gift">${giftText}</div>
      `;

      const track = root.querySelector('.roller-track');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (track) {
            track.style.transform = `translateY(-${(sequence.length - 1) * 100}%)`;
          }
        });
      });

      rollTimeout = setTimeout(() => {
        rollTimeout = null;
        renderFinal(entry);
      }, 2550);
    }

    function render() {
      const entry = getLatestSpinEntry();
      if (!entry) {
        clearTimeout(rollTimeout);
        root.innerHTML = '<div class="empty">Spin untuk Random mutasi</div>';
        return;
      }
      const lastAt = Number(entry.lastSpinAt || entry.lastAddedAt || entry.time || 0);
      if (lastAt && Date.now() - lastAt > 10000) {
        clearTimeout(rollTimeout);
        root.innerHTML = '<div class="empty">Spin untuk Random mutasi</div>';
        return;
      }
      const spinKey = `${entry.id}:${entry.lastSpinAt || entry.lastAddedAt || entry.time || 0}:${entry.action || ''}`;
      if (spinKey !== lastSeenSpinKey) {
        lastSeenSpinKey = spinKey;
        animateSpin(entry);
        return;
      }
      if (!rollTimeout) {
        renderFinal(entry);
      }
    }

    render();
    setInterval(render, 800);
    window.addEventListener("storage", render);
  </script>
</body>
</html>
