<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Antrean Overlay</title>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes itemIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }

    :root {
      color-scheme: dark;
      --bg: rgba(0,0,0,0);
      --card: rgba(8,14,24,0.94);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.55);
      --accent: #ff6b35;
      --green: #10b981;
      --yellow: #fbbf24;
      --blue: #3b82f6;
      --gray: #9ca3af;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh;
      background:var(--bg);
      font-family:"Segoe UI",system-ui,sans-serif;
      color:var(--text);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .queue-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 14px;
      background:var(--card);
      border-bottom:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;
    }
    .queue-title {
      font-size:0.95rem;
      font-weight:800;
      color:var(--text);
      display:flex;
      align-items:center;
      gap:6px;
    }
    .queue-count {
      font-size:0.7rem;
      color:var(--muted);
      padding:2px 7px;
      border-radius:999px;
      background:rgba(255,255,255,0.06);
      font-weight:700;
    }

    .queue-list {
      flex:1;
      overflow-y:auto;
      padding:5px 8px;
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .queue-item {
      display:flex;
      align-items:center;
      gap:5px;
      padding:5px 8px;
      border-radius:7px;
      background:rgba(255,255,255,0.035);
      border-left:3px solid var(--yellow);
      animation:itemIn 0.25s ease;
      font-size:0.75rem;
    }
    .queue-item.inProgress { border-left-color:var(--green); }
    .queue-item.awaitingDelivery { border-left-color:var(--blue); }

    .queue-no {
      font-size:0.6rem;
      font-weight:800;
      color:var(--muted);
      min-width:20px;
      text-align:center;
      opacity:0.7;
    }
    .queue-name {
      font-weight:700;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:90px;
      flex-shrink:0;
      font-size:0.73rem;
    }
    .queue-badge {
      padding:1px 5px;
      border-radius:4px;
      font-size:0.6rem;
      font-weight:700;
      white-space:nowrap;
    }
    .queue-badge.pending { background:rgba(251,191,36,0.12); color:#fbbf24; }
    .queue-badge.inProgress { background:rgba(16,185,129,0.12); color:#10b981; }
    .queue-badge.awaitingDelivery { background:rgba(59,130,246,0.12); color:#3b82f6; }

    .queue-gift {
      color:rgba(79,195,247,0.75);
      font-size:0.6rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100px;
    }

    .empty-msg {
      text-align:center;
      color:var(--muted);
      font-size:0.82rem;
      padding:24px 14px;
    }
  </style>
</head>
<body>
  <div class="queue-header">
    <span class="queue-title">📋 Antrean</span>
    <span class="queue-count" id="queueCount">0</span>
  </div>
  <div class="queue-list" id="queueList">
    <div class="empty-msg">Menunggu data...</div>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var backendUrl = (params.get("backend") || "").replace(/\/$/, "");
    var listEl = document.getElementById("queueList");
    var countEl = document.getElementById("queueCount");

    function getStatusClass(s) {
      if (s==="inProgress") return "inProgress";
      if (s==="awaitingDelivery") return "awaitingDelivery";
      return "pending";
    }

    function getStatusLabel(s) {
      var labels = { pending:"Menunggu", inProgress:"Proses", awaitingDelivery:"Kirim", done:"Selesai" };
      return labels[s] || labels.pending;
    }

    function esc(t) { return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function getBadgeText(e) {
      if (e.action && !e.unmatched) return e.action;
      if (e.giftName && e.giftName !== "-") return e.giftName;
      return getStatusLabel(e.status || "pending");
    }

    function render(queue) {
      if (!queue || queue.length === 0) {
        listEl.innerHTML = '<div class="empty-msg">Belum ada antrean</div>';
        countEl.textContent = "0";
        return;
      }

      var active = queue.filter(function(e) { return e.status !== "done"; });
      active.sort(function(a,b) { return (a.time||0) - (b.time||0); });

      countEl.textContent = active.length;

      if (active.length === 0) {
        listEl.innerHTML = '<div class="empty-msg">Semua selesai</div>';
        return;
      }

      var html = "";
      var max = Math.min(active.length, 25);
      for (var i = 0; i < max; i++) {
        var e = active[i];
        var statusKey = e.status || "pending";
        var statusClass = getStatusClass(statusKey);
        var badge = getBadgeText(e);

        var giftText = "";
        if (e.giftName && e.giftName !== "-") {
          var qty = e.giftQty || e.qty || 1;
          giftText = e.giftName + (qty > 1 ? " x" + qty : "");
          if (e.diamondCount) giftText += " " + e.diamondCount + "🪙";
        }

        html += '<div class="queue-item ' + statusClass + '">';
        html += '<span class="queue-no">#' + (i+1) + '</span>';
        html += '<span class="queue-name">' + esc(e.user) + '</span>';
        html += '<span class="queue-badge ' + statusClass + '">' + esc(badge) + '</span>';
        if (giftText) html += '<span class="queue-gift">' + esc(giftText) + '</span>';
        html += '</div>';
      }

      listEl.innerHTML = html;
      listEl.scrollTop = listEl.scrollHeight;
    }

    async function fetchQueue() {
      if (!backendUrl) {
        listEl.innerHTML = '<div class="empty-msg" style="color:#ff6b35">Tambahkan ?backend=URL</div>';
        return;
      }
      try {
        var res = await fetch(backendUrl + "/queue-state", { cache: "no-store" });
        if (!res.ok) return;
        var data = await res.json();
        if (data.queue) render(data.queue);
      } catch (e) {}
    }

    if (backendUrl) {
      fetchQueue();
      setInterval(fetchQueue, 1200);
    } else {
      listEl.innerHTML = '<div class="empty-msg" style="color:#ff6b35">Tambahkan ?backend=URL di address bar</div>';
    }
  </script>
</body>
</html>
