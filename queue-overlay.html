<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Antrean</title>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes itemIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }

    :root {
      color-scheme: dark;
      --bg: rgba(0,0,0,0);
      --card: rgba(8,14,24,0.94);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.5);
      --green: #10b981;
      --yellow: #fbbf24;
      --blue: #3b82f6;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh;
      background:var(--bg);
      font-family:"Segoe UI",system-ui,sans-serif;
      color:var(--text);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 14px;
      background:var(--card);
      border-bottom:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;
    }
    .header-title {
      font-size:0.9rem;
      font-weight:800;
      color:var(--text);
    }
    .header-count {
      font-size:0.68rem;
      color:var(--muted);
      padding:2px 7px;
      border-radius:999px;
      background:rgba(255,255,255,0.06);
      font-weight:700;
    }

    .list {
      flex:1;
      overflow-y:auto;
      padding:5px 8px;
      display:flex;
      flex-direction:column;
      gap:3px;
    }
    .list::-webkit-scrollbar { width:4px; }
    .list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:999px; }

    .item {
      display:flex;
      align-items:center;
      gap:6px;
      padding:5px 8px;
      border-radius:7px;
      background:rgba(255,255,255,0.03);
      border-left:3px solid var(--yellow);
      animation:itemIn 0.2s ease;
      font-size:0.73rem;
    }
    .item.inProgress { border-left-color:var(--green); background:rgba(16,185,129,0.04); }
    .item.awaitingDelivery { border-left-color:var(--blue); background:rgba(59,130,246,0.04); }

    .no {
      font-size:0.58rem;
      font-weight:800;
      color:var(--muted);
      min-width:18px;
      text-align:center;
      opacity:0.6;
    }
    .name {
      font-weight:700;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:85px;
      flex-shrink:0;
      font-size:0.72rem;
    }
    .badge {
      padding:1px 5px;
      border-radius:4px;
      font-size:0.58rem;
      font-weight:700;
      white-space:nowrap;
    }
    .badge.pending { background:rgba(251,191,36,0.1); color:rgba(251,191,36,0.9); }
    .badge.inProgress { background:rgba(16,185,129,0.1); color:rgba(16,185,129,0.9); }
    .badge.awaitingDelivery { background:rgba(59,130,246,0.1); color:rgba(59,130,246,0.9); }

    .gift {
      color:rgba(79,195,247,0.7);
      font-size:0.58rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:90px;
    }

    .empty {
      text-align:center;
      color:var(--muted);
      font-size:0.8rem;
      padding:20px 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">📋 Antrean</span>
    <span class="header-count" id="count">0</span>
  </div>
  <div class="list" id="list">
    <div class="empty">Menunggu data...</div>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var backendUrl = (params.get("backend") || "").replace(/\/$/, "");
    var listEl = document.getElementById("list");
    var countEl = document.getElementById("count");

    function getStatusClass(s) {
      if (s==="inProgress") return "inProgress";
      if (s==="awaitingDelivery") return "awaitingDelivery";
      return "pending";
    }
    function getStatusLabel(s) {
      return {pending:"Menunggu",inProgress:"Proses",awaitingDelivery:"Kirim",done:"Selesai"}[s] || "Menunggu";
    }
    function esc(t) { return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function getBadge(e) {
      if (e.action && !e.unmatched) return e.action;
      if (e.giftName && e.giftName !== "-") return e.giftName;
      return getStatusLabel(e.status || "pending");
    }

    function render(queue) {
      if (!queue || !queue.length) {
        listEl.innerHTML = '<div class="empty">Belum ada antrean</div>';
        countEl.textContent = "0";
        return;
      }
      var active = queue.filter(function(e) { return e.status !== "done"; });
      active.sort(function(a,b) { return (a.time||0) - (b.time||0); });
      countEl.textContent = active.length;

      if (!active.length) {
        listEl.innerHTML = '<div class="empty">Semua selesai</div>';
        return;
      }

      var h = "";
      var max = Math.min(active.length, 20);
      for (var i = 0; i < max; i++) {
        var e = active[i];
        var sc = getStatusClass(e.status || "pending");
        var badge = getBadge(e);
        var gift = "";
        if (e.giftName && e.giftName !== "-") {
          var q = e.giftQty || e.qty || 1;
          gift = e.giftName + (q > 1 ? " x" + q : "");
          if (e.diamondCount) gift += " " + e.diamondCount + "🪙";
        }
        h += '<div class="item ' + sc + '">';
        h += '<span class="no">#' + (i+1) + '</span>';
        h += '<span class="name">' + esc(e.user) + '</span>';
        h += '<span class="badge ' + sc + '">' + esc(badge) + '</span>';
        if (gift) h += '<span class="gift">' + esc(gift) + '</span>';
        h += '</div>';
      }
      listEl.innerHTML = h;
      listEl.scrollTop = listEl.scrollHeight;
    }

    async function fetchQueue() {
      if (!backendUrl) {
        listEl.innerHTML = '<div class="empty" style="color:#ff6b35">Tambahkan ?backend=URL</div>';
        return;
      }
      try {
        var res = await fetch(backendUrl + "/queue-state", {cache:"no-store"});
        if (!res.ok) return;
        var data = await res.json();
        if (data.queue) render(data.queue);
      } catch(e) {}
    }

    if (backendUrl) {
      fetchQueue();
      setInterval(fetchQueue, 1200);
    } else {
      listEl.innerHTML = '<div class="empty" style="color:#ff6b35">Tambahkan ?backend=URL di address bar</div>';
    }
  </script>
</body>
</html>
