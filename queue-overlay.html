<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Antrean Overlay</title>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes itemIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

    :root {
      color-scheme: dark;
      --bg: rgba(0,0,0,0);
      --card: rgba(8,14,24,0.92);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.6);
      --accent: #ff6b35;
      --accent-2: #3b82f6;
      --green: #10b981;
      --yellow: #fbbf24;
      --blue: #3b82f6;
      --gray: #9ca3af;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh;
      background:var(--bg);
      font-family:"Segoe UI",system-ui,sans-serif;
      color:var(--text);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .queue-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 14px;
      background:var(--card);
      border-bottom:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;
    }
    .queue-title {
      font-size:1rem;
      font-weight:800;
      color:var(--text);
    }
    .queue-count {
      font-size:0.75rem;
      color:var(--muted);
      padding:2px 8px;
      border-radius:999px;
      background:rgba(255,255,255,0.06);
    }

    .queue-list {
      flex:1;
      overflow-y:auto;
      padding:6px 10px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .queue-item {
      display:flex;
      align-items:center;
      gap:6px;
      padding:5px 8px;
      border-radius:8px;
      background:rgba(255,255,255,0.04);
      border-left:3px solid var(--yellow);
      animation:itemIn 0.3s ease;
      font-size:0.78rem;
    }
    .queue-item.inProgress { border-left-color:var(--green); }
    .queue-item.awaitingDelivery { border-left-color:var(--blue); }

    .queue-no {
      font-size:0.65rem;
      font-weight:800;
      color:var(--muted);
      min-width:24px;
      text-align:center;
    }
    .queue-name {
      font-weight:700;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100px;
      flex-shrink:0;
    }
    .queue-badge {
      padding:1px 6px;
      border-radius:4px;
      font-size:0.65rem;
      font-weight:700;
      white-space:nowrap;
    }
    .queue-badge.pending { background:rgba(251,191,36,0.15); color:#fbbf24; }
    .queue-badge.inProgress { background:rgba(16,185,129,0.15); color:#10b981; }
    .queue-badge.awaitingDelivery { background:rgba(59,130,246,0.15); color:#3b82f6; }

    .queue-action {
      color:var(--muted);
      font-size:0.68rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:140px;
    }
    .queue-gift {
      color:rgba(79,195,247,0.8);
      font-size:0.65rem;
      white-space:nowrap;
    }

    .empty-msg {
      text-align:center;
      color:var(--muted);
      font-size:0.85rem;
      padding:30px 16px;
    }
  </style>
</head>
<body>
  <div class="queue-header">
    <span class="queue-title">Antrean</span>
    <span class="queue-count" id="queueCount">0</span>
  </div>
  <div class="queue-list" id="queueList">
    <div class="empty-msg">Belum ada antrean</div>
  </div>
  <script>
    var STORAGE_KEY = "tiktok_live_tool_state_v1";
    var listEl = document.getElementById("queueList");
    var countEl = document.getElementById("queueCount");
    var lastRenderTime = 0;

    function formatTime(ts) {
      if (!ts) return "";
      var d = new Date(ts);
      return (d.getHours()<10?"0":"") + d.getHours() + ":" + (d.getMinutes()<10?"0":"") + d.getMinutes();
    }

    function getStatusLabel(s) {
      var labels = { pending:"Menunggu", inProgress:"Proses", awaitingDelivery:"Kirim", done:"Selesai" };
      return labels[s] || labels.pending;
    }

    function getStatusClass(s) {
      if (s==="inProgress") return "inProgress";
      if (s==="awaitingDelivery") return "awaitingDelivery";
      return "pending";
    }

    function esc(t) { return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function render() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        var parsed = JSON.parse(raw);
        var queue = parsed.jokiQueue || [];
        var now = Date.now();
        if (now - lastRenderTime < 800) return;
        lastRenderTime = now;

        var active = queue.filter(function(e) { return e.status !== "done"; });
        active.sort(function(a,b) { return (a.time||0) - (b.time||0); });

        countEl.textContent = active.length;

        if (active.length === 0) {
          listEl.innerHTML = '<div class="empty-msg">Belum ada antrean</div>';
          return;
        }

        var html = "";
        var max = Math.min(active.length, 30);
        for (var i = 0; i < max; i++) {
          var e = active[i];
          var statusKey = e.status || "pending";
          var statusClass = getStatusClass(statusKey);

          var badge = "";
          if (e.action && !e.unmatched) {
            badge = e.action;
          } else if (e.giftName && e.giftName !== "-") {
            badge = e.giftName;
          } else {
            badge = getStatusLabel(statusKey);
          }

          var giftText = "";
          if (e.giftName && e.giftName !== "-") {
            var qty = e.giftQty || e.qty || 1;
            giftText = e.giftName + (qty > 1 ? " x" + qty : "");
            if (e.diamondCount) giftText += " " + e.diamondCount + "🪙";
          }

          html += '<div class="queue-item ' + statusClass + '">';
          html += '<span class="queue-no">#' + (i+1) + '</span>';
          html += '<span class="queue-name">' + esc(e.user) + '</span>';
          html += '<span class="queue-badge ' + statusClass + '">' + esc(badge) + '</span>';
          if (giftText) html += '<span class="queue-gift">' + esc(giftText) + '</span>';
          html += '</div>';
        }

        listEl.innerHTML = html;

        listEl.scrollTop = listEl.scrollHeight;
      } catch(ex) {}
    }

    render();
    setInterval(render, 1000);
    window.addEventListener("storage", render);
  </script>
</body>
</html>
